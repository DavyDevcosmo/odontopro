name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_URL: http://localhost:3000
      STRIPE_SUCCESS_URL: http://localhost:3000/dashboard/plans
      STRIPE_CANCEL_URL: http://localhost:3000/dashboard/plans
      STRIPE_PLAN_BASIC: price_basic
      STRIPE_PLAN_PROFESSIONAL: price_pro
      DATABASE_URL: postgresql://user:pass@localhost:5432/test
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-secret-fallback-32-chars-minimum' }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'ci-google-id' }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci-google-secret' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci' }}
      CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME || 'ci' }}
      CLOUDINARY_KEY: ${{ secrets.CLOUDINARY_KEY || 'ci' }}
      CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET || 'ci' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npx next build
        